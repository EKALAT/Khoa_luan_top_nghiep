services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smart_attendance_app
    working_dir: /var/www/html
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - smart_attendance_net

  nginx:
    image: nginx:alpine
    container_name: smart_attendance_nginx
    ports:
      - "8000:80"
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - smart_attendance_net

  db:
    image: mysql:8.0
    container_name: smart_attendance_db
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_DATABASE: smart_attendance
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - smart_attendance_db_data:/var/lib/mysql
    networks:
      - smart_attendance_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smart_attendance_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Ho_Chi_Minh
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - smart_attendance_net

volumes:
  smart_attendance_db_data:


networks:
  smart_attendance_net:
    driver: bridge
